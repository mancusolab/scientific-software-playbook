name: playbook-ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shell syntax checks
        run: |
          set -euo pipefail
          while IFS= read -r script; do
            bash -n "$script"
          done < <(find scripts plugins -type f -name '*.sh' | sort)

      - name: JSON manifest checks
        run: |
          set -euo pipefail
          python3 -m json.tool .claude-plugin/marketplace.json >/dev/null
          python3 -m json.tool plugins/scientific-plan-execute/.claude-plugin/plugin.json >/dev/null
          python3 -m json.tool plugins/scientific-research/.claude-plugin/plugin.json >/dev/null
          python3 -m json.tool plugins/scientific-house-style/.claude-plugin/plugin.json >/dev/null
          python3 -m json.tool plugins/scientific-plan-execute/hooks/hooks.json >/dev/null

      - name: Repository contract checks
        run: |
          set -euo pipefail
          bash plugins/scientific-plan-execute/scripts/check-repo-contracts.sh

      - name: Codex install smoke test
        run: |
          set -euo pipefail

          codex_home="$(mktemp -d)"

          mkdir -p "$codex_home/skills/howto-functional-vs-imperative"
          touch "$codex_home/skills/howto-functional-vs-imperative/SKILL.md"

          bash scripts/install-codex-home.sh --codex-home "$codex_home" --force

          bundle="$codex_home/scientific-software-playbook"
          plan_plugin="$bundle/plugins/scientific-plan-execute"
          research_plugin="$bundle/plugins/scientific-research"
          house_plugin="$bundle/plugins/scientific-house-style"

          test -d "$plan_plugin"
          test -d "$research_plugin"
          test -d "$house_plugin"
          test -f "$codex_home/skills/using-plan-and-execute/SKILL.md"
          test -f "$codex_home/skills/starting-a-design-plan/SKILL.md"
          test -f "$codex_home/skills/scientific-kickoff/SKILL.md"
          test -f "$codex_home/skills/new-design-plan/SKILL.md"
          test -f "$codex_home/skills/scientific-internet-research-pass/SKILL.md"
          test -f "$codex_home/skills/functional-core-imperative-shell/SKILL.md"
          test -f "$codex_home/skills/jax-project-engineering/SKILL.md"
          test ! -d "$codex_home/skills/howto-functional-vs-imperative"

          # Legacy root bundle compatibility paths must remain absent.
          test ! -e "$bundle/agents"
          test ! -e "$bundle/commands"
          test ! -e "$bundle/hooks"
          test ! -e "$bundle/scripts"

      - name: Selective install smoke tests
        run: |
          set -euo pipefail

          codex_home_plan="$(mktemp -d)"
          bash scripts/install-codex-home.sh --codex-home "$codex_home_plan" --force --plugin scientific-plan-execute
          test -d "$codex_home_plan/scientific-software-playbook/plugins/scientific-plan-execute"
          test -d "$codex_home_plan/scientific-software-playbook/plugins/scientific-research"
          test -d "$codex_home_plan/scientific-software-playbook/plugins/scientific-house-style"
          test -f "$codex_home_plan/skills/using-plan-and-execute/SKILL.md"
          test -f "$codex_home_plan/skills/starting-a-design-plan/SKILL.md"
          test -f "$codex_home_plan/skills/scientific-kickoff/SKILL.md"
          test -f "$codex_home_plan/skills/new-design-plan/SKILL.md"
          test -f "$codex_home_plan/skills/scientific-internet-research-pass/SKILL.md"
          test -f "$codex_home_plan/skills/functional-core-imperative-shell/SKILL.md"
          test -f "$codex_home_plan/skills/jax-equinox-numerics/SKILL.md"
          test -f "$codex_home_plan/skills/jax-project-engineering/SKILL.md"
          test ! -d "$codex_home_plan/skills/howto-functional-vs-imperative"

          codex_home_research="$(mktemp -d)"
          bash scripts/install-codex-home.sh --codex-home "$codex_home_research" --force --plugin scientific-research
          test -d "$codex_home_research/scientific-software-playbook/plugins/scientific-research"
          test ! -d "$codex_home_research/scientific-software-playbook/plugins/scientific-plan-execute"
          test ! -d "$codex_home_research/scientific-software-playbook/plugins/scientific-house-style"
          test -f "$codex_home_research/skills/scientific-internet-research-pass/SKILL.md"
          test -f "$codex_home_research/skills/scientific-codebase-investigation-pass/SKILL.md"
          test ! -d "$codex_home_research/skills/starting-a-design-plan"
          test ! -d "$codex_home_research/skills/scientific-kickoff"
          test ! -d "$codex_home_research/skills/jax-project-engineering"

          codex_home_house="$(mktemp -d)"
          bash scripts/install-codex-home.sh --codex-home "$codex_home_house" --force --plugin scientific-house-style
          test -d "$codex_home_house/scientific-software-playbook/plugins/scientific-house-style"
          test ! -d "$codex_home_house/scientific-software-playbook/plugins/scientific-plan-execute"
          test -f "$codex_home_house/skills/functional-core-imperative-shell/SKILL.md"
          test -f "$codex_home_house/skills/jax-equinox-numerics/SKILL.md"
          test -f "$codex_home_house/skills/jax-project-engineering/SKILL.md"
          test ! -d "$codex_home_house/skills/howto-functional-vs-imperative"
          test ! -d "$codex_home_house/skills/starting-a-design-plan"
